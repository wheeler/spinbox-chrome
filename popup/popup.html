<html>
  <link rel="stylesheet" href="popup.css" />
  <body>
    <h1>spinbox</h1>

    <div class="pop-section">
      Note that all information in the extension is stored locally in your chrome extension and not sent anywhere else.
    </div>
    <div class="pop-section">
      <div>private auth information (allows the plugin to access the soundcloud api)</div>
      <div><label for="clientId">Client ID</label> - <input id="clientId" type="text" size=38></input></div>
      <div><label for="accessToken">Auth Token</label> - <input id="accessToken" type="text" size=36></input></div>
      <button id="updateAuth">update auth information</button>
    </div>
    <div class="pop-section">
      <div>settings for music selection</div>
      <div><label for="digPlaylist">Dig Playlist ID</label> - <input id="digPlaylist" type="text" size="12"></input></div>
      <button id="updateDigSettings">update settings</button>
    </div>
    <div class="pop-section">
      There are currently
      <span id="hiddenTracksCount">(loading...)</span> hidden tracks.
      <div><button id="hiddenTracksResetButton">Reset Hidden Tracks</button></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
